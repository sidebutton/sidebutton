schema_version: 1
version: "1.0.0"
last_verified: "2026-03-18"
id: agent_pm_release_notes
title: "PM Agent: Release Notes"
description: "Generate a changelog from merged PRs and Done tickets in a sprint, categorized by type, and post as a Jira comment or Confluence page"
category:
  level: pipeline
  domain: engineering

metadata:
  agent: true
  role: pm

params:
  project_key:
    type: string
    description: "Jira project key (e.g. SCRUM)"
  sprint_name:
    type: string
    default: ""
    description: "Sprint name to generate notes for. Leave empty to use the most recently completed sprint."
  repo:
    type: string
    default: ""
    description: "GitHub repo (owner/repo) to scan for PRs, e.g. 'myorg/myapp'. Leave empty to discover from ticket comments."
  hint:
    type: string
    default: ""
    description: "Optional extra instructions for the agent"
  entry_path:
    type: string
    default: "~/workspace"
    description: "Working directory for the agent"

steps:
  - type: terminal.open
    title: "Agent: PM Release Notes"
    cwd: "{{entry_path}}"

  - type: terminal.run
    cmd: >-
      source ~/.agent-env && claude --dangerously-skip-permissions
      "you are a PM agent. your job is to generate formatted release notes from a completed sprint.

      STEP 1 — DETERMINE SPRINT:
      if sprint_name is provided ('{{sprint_name}}'), use JQL: project = {{project_key}} AND sprint = '{{sprint_name}}' AND status = Done ORDER BY updated DESC
      otherwise: first find the most recently completed sprint by calling mcp__claude_ai_Atlassian__searchJiraIssuesUsingJql (cloudId: 'venmate.atlassian.net') with JQL:
        project = {{project_key}} AND sprint in closedSprints() AND status = Done ORDER BY sprint DESC, updated DESC
      read customfield_10020 from the first result to identify the most recently closed sprint name and dates.
      then re-query with the correct sprint filter to get ALL Done tickets.
      if no closed sprint exists, fall back to openSprints().
      request fields: key, summary, status, issuetype, labels, comment, description, priority, assignee.
      if the JQL call fails, stop and report the error clearly.

      STEP 2 — EXTRACT PR LINKS FROM EACH TICKET:
      for each Done ticket, search for PR references in:
        a) ticket comments: look for patterns 'PR #N', 'PR: #N', github.com/*/pull/N URLs
        b) ticket description: same patterns
        c) issue remote links if available
      for each discovered PR link, extract the owner/repo and PR number.
      if {{repo}} is provided, also run: gh pr list --repo {{repo}} --state merged --json number,title,body,labels,mergedAt --limit 100
      and cross-reference PRs by looking for ticket key (e.g. SCRUM-42) in PR title or body.
      deduplicate: one ticket may link to one PR; skip tickets with no discoverable PR (include them as 'no PR' items).

      STEP 3 — READ PR DETAILS VIA GH CLI:
      for each discovered PR (owner/repo + number), run:
        gh pr view <NUMBER> --repo <OWNER/REPO> --json number,title,body,labels,mergedAt,author
      extract: title, first line of body (the summary sentence), labels, and mergedAt date.
      if gh CLI fails for a PR, use the ticket summary as the description instead.

      STEP 4 — CATEGORIZE EACH CHANGE:
      assign each ticket+PR to exactly one category using these rules (in priority order):
        1. Features       — issuetype is Story/Epic, OR PR title starts with 'feat', OR label contains 'feature'
        2. Bug Fixes      — issuetype is Bug, OR PR title starts with 'fix', OR label contains 'bug'
        3. Improvements   — PR title starts with 'refactor'/'perf'/'improve'/'chore', OR label contains 'improvement'/'enhancement'
        4. Infrastructure — PR title starts with 'ci'/'build'/'infra'/'deps', OR label contains 'infrastructure'/'devops'
        5. Other          — anything that doesn't match above categories
      record for each item: ticket key, ticket summary, PR number (or 'no PR'), category, one-line description (PR title if available, else ticket summary).

      STEP 5 — GENERATE RELEASE NOTES:
      compose the full release notes document in this exact markdown format:

      # Release Notes — {{project_key}}
      **Sprint:** <sprint name>  |  **Released:** <mergedAt date of last PR, or today's date>

      ## Features
      - [PROJ-N](https://aictpo.atlassian.net/browse/PROJ-N) — <one-line description> (PR #N)

      ## Bug Fixes
      - [PROJ-N](https://aictpo.atlassian.net/browse/PROJ-N) — <one-line description> (PR #N)

      ## Improvements
      - [PROJ-N](https://aictpo.atlassian.net/browse/PROJ-N) — <one-line description> (PR #N)

      ## Infrastructure
      - [PROJ-N](https://aictpo.atlassian.net/browse/PROJ-N) — <one-line description> (PR #N)

      ---
      _Generated by PM Agent on <today's date>. <N> tickets, <N> PRs._

      rules:
      - omit a section entirely if it has no items
      - for tickets with no PR, include them without a PR reference: (no PR)
      - keep descriptions to one line each
      - ticket keys must link to the Jira issue URL
      - sort items within each section alphabetically by ticket key

      {{hint}}

      STEP 6 — POST RELEASE NOTES:
      post the generated release notes as a comment on the sprint summary ticket or a relevant parent ticket.
      to find the right ticket: search Jira for a ticket in project {{project_key}} whose summary contains 'release' or 'changelog' or 'sprint' and is not Done.
      if no such ticket exists, find the parent epic or the ticket with the most Done children, and post there.
      use mcp__claude_ai_Atlassian__addCommentToJiraIssue (cloudId: 'venmate.atlassian.net') to post.
      after posting, print the full release notes to stdout as well, along with the Jira ticket key where the comment was posted."
